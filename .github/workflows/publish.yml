name: Publish to PyPI

# Trusted publishing (OIDC) — no API tokens. Run manually after the PyPI trusted publisher is configured
# (Settings → Publishing on pypi.org, workflow "publish.yml", environment "pypi"). Once that's in place,
# add `release: {types: [published]}` below to publish automatically on every GitHub release.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lerobot-genesis
    permissions:
      id-token: write # mint the OIDC token PyPI verifies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
